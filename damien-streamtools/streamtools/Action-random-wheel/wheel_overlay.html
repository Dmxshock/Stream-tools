<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Action Random Wheel – Overlay</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    #wheel {
      width: 400px;
      height: 400px;
      border-radius: 50%;
      border: 6px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 30% 30%, #ffcc00, #ff0066);
      box-shadow: 0 0 30px rgba(0,0,0,0.8);
      font-size: 24px;
      text-align: center;
    }

    #status {
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <div id="wheel">Wheel Overlay<br>(Step 1 – Base)</div>
  <div id="status">Waiting for popup control window…</div>

  <script src="wheel_commons.js"></script>
  <script>
    const statusEl = document.getElementById('status');
    const wheelEl = document.getElementById('wheel');

    // Called by shared code when a message arrives from the popup
    function handleControlMessage(data) {
      // For Step 1 we only show simple text feedback
      if (data.type === 'ping') {
        statusEl.textContent = 'Popup connected ✔';
      } else if (data.type === 'test-command') {
        wheelEl.textContent = 'Received: ' + data.payload;
        statusEl.textContent = 'Last command: ' + data.payload;
      }
    }

    // Register handler with shared module
    window.WHEEL_OVERLAY_API = {
      onControlMessage: handleControlMessage
    };

    // Initialize message listener
    window.WHEEL_COMMONS.initOverlay();
  </script>
</body>
</html>
