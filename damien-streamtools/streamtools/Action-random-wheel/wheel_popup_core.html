<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Wheel Popup</title>
  <style>
    body {
      margin: 0;
      background: #1a1a1a;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    #wheelCanvas {
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: #333;
      margin-bottom: 20px;
    }

    #controls {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    button {
      padding: 10px;
      background: #444;
      border: none;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #666;
    }

    input {
      padding: 8px;
      width: 100%;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

<h2>Wheel Popup (Step 1)</h2>

<canvas id="wheelCanvas" width="400" height="400"></canvas>

<div id="controls">
  <input id="choiceInput" placeholder="Add choice..." />
  <button onclick="addChoice()">Add Choice</button>
  <button onclick="spinWheel()">Spin Wheel</button>
  <button onclick="resetWheel()">Reset Wheel</button>
</div>

<script>
let choices = ["Option 1", "Option 2", "Option 3"];
let angle = 0;
let spinning = false;

const canvas = document.getElementById("wheelCanvas");
const ctx = canvas.getContext("2d");

function drawWheel() {
  const total = choices.length;
  const arc = (2 * Math.PI) / total;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < total; i++) {
    ctx.beginPath();
    ctx.fillStyle = i % 2 === 0 ? "#ff0066" : "#ffcc00";
    ctx.moveTo(200, 200);
    ctx.arc(200, 200, 200, angle + i * arc, angle + (i + 1) * arc);
    ctx.fill();

    ctx.save();
    ctx.translate(200, 200);
    ctx.rotate(angle + i * arc + arc / 2);
    ctx.textAlign = "right";
    ctx.fillStyle = "white";
    ctx.font = "18px Arial";
    ctx.fillText(choices[i], 180, 10);
    ctx.restore();
  }
}

function spinWheel() {
  if (spinning) return;
  spinning = true;

  let spinTime = 3000;
  let start = performance.now();
  let speed = Math.random() * 0.2 + 0.25;

  function animate(now) {
    let elapsed = now - start;
    angle += speed;
    speed *= 0.99;

    drawWheel();

    if (elapsed < spinTime) {
      requestAnimationFrame(animate);
    } else {
      spinning = false;
    }
  }

  requestAnimationFrame(animate);
}

function addChoice() {
  const input = document.getElementById("choiceInput");
  if (input.value.trim() !== "") {
    choices.push(input.value.trim());
    input.value = "";
    drawWheel();
  }
}

function resetWheel() {
  choices = [];
  drawWheel();
}

drawWheel();
</script>

</body>
</html>
